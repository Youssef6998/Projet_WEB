{% extends "base.twig.html" %}
{% block title %}Créer un compte Pilote – Stage Finder{% endblock %}
{% block content %}
<div class="page">
    <div class="mgmt-wrap">

        <div class="mgmt-header">
            <span class="mgmt-eyebrow">Pilote</span>
            <h1>Créer un compte Pilote</h1>
            <p>Renseignez les informations pour créer un nouveau compte pilote.</p>
        </div>

        <div class="mgmt-card">
            <a href="/?uri=pilote_list" class="mgmt-back">← Retour à la liste</a>

            {% if erreur %}
            <div class="alert alert-error">{{ erreur }}</div>
            {% endif %}

            <form method="POST" action="/?uri=pilote_create">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <div class="frow">
                    <div class="fgrp">
                        <label>Nom *</label>
                        <input type="text" name="nom" placeholder="Nom" required>
                    </div>
                    <div class="fgrp">
                        <label>Prénom *</label>
                        <input type="text" name="prenom" placeholder="Prénom" required>
                    </div>
                </div>
                <div class="fgrp">
                    <label>Email *</label>
                    <input type="email" name="email" placeholder="pilote@stageconnect.fr" required>
                </div>
                <div class="fgrp">
                    <label>Téléphone *</label>
                    <input type="tel" name="telephone" placeholder="+33 6 12 34 56 78" required>
                </div>
                <div class="fgrp">
                    <label>Promotion *</label>
                    <select name="promotion" required>
                        <option value="">— Sélectionner une promotion —</option>
                        <option>CPIA1</option>
                        <option>CPIA2</option>
                        <option>FISA A3</option>
                        <option>FISE A3</option>
                        <option>FISA A4</option>
                        <option>FISE A4</option>
                        <option>FISE A5</option>
                        <option>FISA A5</option>
                    </select>
                </div>
                <div class="frow">
                    <div class="fgrp">
                        <label>Mot de passe *</label>
                        <input type="password" name="motdepasse" placeholder="Créer un mot de passe" required>
                    </div>
                    <div class="fgrp">
                        <label>Confirmer le mot de passe *</label>
                        <input type="password" name="confirmation" placeholder="Confirmer" required>
                    </div>
                </div>
                <div class="fcb">
                    <input type="checkbox" id="cgu" required>
                    <label for="cgu">J'accepte les conditions générales</label>
                </div>
                <button type="submit" class="mgmt-submit">Créer le compte pilote</button>
            </form>
        </div>

    </div>
</div>
{% endblock %}

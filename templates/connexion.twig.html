<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
    <link rel="stylesheet" href="/assets/connexion.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="container">
    <div class="login-card">
    <div class="back-btn-container">
        <a href="/?uri=home" class="btn-back">
            ← Retour
        </a>
    </div>

            <h1>Connexion</h1>

            {% if erreur %}
                <div style="background:#ffe0e0;color:#c00;border:1px solid #f5a5a5;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:14px;">
                    {{ erreur }}
                </div>
            {% endif %}

            <form method="POST" action="/?uri=login">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="Votre email" required>
                </div>

                <div class="input-group">
                    <label>Mot de passe</label>
                    <input type="password" name="motdepasse" placeholder="Votre mot de passe" required>
                </div>

                <button type="submit" class="btn-primary">Se connecter</button>

                <p class="register">
                    Pas encore de compte ? <a href="/?uri=register">Créer un compte</a>
                </p>
            </form>
        </div>
    </div>
</body>
</html>

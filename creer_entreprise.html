<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer une entreprise</title>
    <link rel="stylesheet" href="creer_entreprise.css">
</head>
<body>

    <div class="register-card">
        <div style="text-align: center; margin-bottom: 10px;">
            <img src="logo.png" alt="Logo" style="max-width: 50px;"> </div>
        <h1>Créer une entreprise</h1> <form>
            <div class="input-group">
                <label for="nom">Nom de l'entreprise</label>
                <input type="text" id="nom" placeholder="Ex: Ma Super Entreprise">
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="pays">Pays</label>
                    <input type="text" id="pays" placeholder="France">
                </div>
                <div class="input-group">
                    <label for="ville">Ville</label>
                    <input type="text" id="ville" placeholder="Paris">
                </div>
            </div>

            <div class="row">
                <div class="input-group" style="flex: 2;">
                    <label for="adresse">Adresse</label>
                    <input type="text" id="adresse" placeholder="123 rue de Rivoli">
                </div>
                <div class="input-group">
                    <label for="cp">Code Postal</label>
                    <input type="text" id="cp" placeholder="75001">
                </div>
            </div>

            <div class="input-group">
                <label for="web">Site web</label>
                <input type="url" id="web" placeholder="https://www.exemple.com">
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="annee">Année de création</label>
                    <input type="number" id="annee" placeholder="2024">
                </div>
                <div class="input-group">
                    <label for="tel">Téléphone</label>
                    <input type="tel" id="tel" placeholder="+33...">
                </div>
            </div>

            <div class="input-group">
                <label for="email">Email de contact</label>
                <input type="email" id="email" placeholder="contact@entreprise.com">
            </div>

            <div class="terms">
                <label><input type="checkbox"> J'accepte les conditions d'utilisation</label>
            </div>

            <button type="submit" class="btn-primary">Créer l'entreprise</button>
        </form>

        <div class="login-link">
            Déjà un compte ? <a href="#">Connexion</a>
        </div>
    </div>

</body>
</html>

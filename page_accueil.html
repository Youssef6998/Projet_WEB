<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Page d'accueil</title>
    <link rel="stylesheet" href="page_accueil.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">LOGO</div>
        <nav class="nav">
            <a href="#" class="active">Page d'accueil</a>
            <a href="#">Créer une entreprise</a>
            <a href="#" class="btn-login">Connexion</a>
        </nav>
    </header>

    <!-- SECTION RECHERCHE -->
    <section class="search-section">
        <h1>Trouvez votre prochaine opportunité</h1>
        <div class="search-bar">
            <input type="text" placeholder="Intitulé du poste ou entreprise">
            <input type="text" placeholder="Localisation">
            <button>Rechercher</button>
        </div>
    </section>

    <!-- SECTION OFFRES -->
    <section class="offers">
        <div class="card">
            <h2>Exemple Offre</h2>
            <p>Développeur Web</p>
            <p>Paris, France</p>
            <button class="btn-secondary">Voir l'offre</button>
        </div>

        <div class="card">
            <h2>Exemple Offre</h2>
            <p>Designer UI/UX</p>
            <p>Lyon, France</p>
            <button class="btn-secondary">Voir l'offre</button>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 - Tous droits réservés</p>
    </footer>

</body>
</html>
